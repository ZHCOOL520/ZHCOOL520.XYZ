<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ZHCOOL520</title>
  <script>
    // GitHub Pages SPA redirect
    // Redirects /tz to /?path=/tz so index.html can restore it
    (function(l) {
      var p = l.pathname;
      if (p !== '/') {
        l.replace('/?path=' + encodeURIComponent(p + l.search + l.hash));
      }
    })(window.location);
  </script>
</head>

</html>
